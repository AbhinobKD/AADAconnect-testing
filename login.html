<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AADAconnect | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #040406;
      --text-p: #ffffff;
      --text-s: rgba(255,255,255,0.5);
      --glass-fill: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.12);
      --accent-hue: 240;
      --accent-glow: hsla(var(--accent-hue),80%,60%,0.5);
      --error-color: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text-p);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      transition: background 1.5s ease;
      position: relative;
    }

    html { height: -webkit-fill-available; }

    /* White theme */
    body.white-theme {
      --bg: #f0f0f5;
      --text-p: #0a0a12;
      --text-s: rgba(10,10,18,0.5);
      --glass-fill: rgba(255,255,255,0.65);
      --glass-border: rgba(0,0,0,0.1);
    }
    body.white-theme .liquid-bg { opacity: 0.2; }

    /* Liquid ambient */
    .liquid-bg {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 0; filter: blur(80px); opacity: 0.6;
      overflow: hidden; pointer-events: none;
    }
    .blob {
      position: absolute; width: 500px; height: 500px;
      border-radius: 50%;
    }

    /* Container */
    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 430px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex; align-items: center; justify-content: center;
    }
    .login-wrapper { width: 100%; }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-logo-icon {
      width: 72px; height: 72px;
      border-radius: 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      backdrop-filter: blur(20px);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .brand-logo-icon i { font-size: 1.6rem; color: hsl(var(--accent-hue),80%,70%); }
    .brand-name {
      font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(to right, #fff, var(--text-s));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      font-size: 0.85rem; color: var(--text-s); margin-top: 6px; font-weight: 500;
    }

    /* Card */
    .login-card {
      background: var(--glass-fill);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 36px;
      padding: 32px;
      background-image: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(255,255,255,0.03) 100%);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 20px 48px -12px var(--accent-glow);
    }

    /* Labels */
    .field-label {
      display: block;
      font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-s);
      margin-bottom: 10px; padding-left: 4px;
    }

    /* Inputs */
    .form-group { margin-bottom: 20px; position: relative; }

    .input-wrapper { position: relative; }

    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--text-s); pointer-events: none;
      transition: stroke 0.3s;
    }

    .password-toggle {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--text-s); cursor: pointer;
      transition: stroke 0.3s; z-index: 10;
    }
    .password-toggle:active { transform: translateY(-50%) scale(0.9); }

    input {
      width: 100%;
      padding: 15px 16px 15px 46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      color: var(--text-p);
      font-size: 0.9rem; font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }
    input.no-right-icon { padding-right: 16px; }
    input.has-toggle    { padding-right: 46px; }
    input:focus {
      border-color: hsla(var(--accent-hue),80%,60%,0.7);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px hsla(var(--accent-hue),80%,60%,0.12);
    }
    input::placeholder { color: var(--text-s); }
    body.white-theme input { background: rgba(0,0,0,0.05); color: #0a0a12; }
    body.white-theme input::placeholder { color: rgba(10,10,18,0.4); }

    /* Error */
    .error {
      color: var(--error-color); font-size: 0.75rem;
      margin-top: 8px; padding-left: 16px;
      font-weight: 600; display: none;
    }
    .error.show { display: block; }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 16px;
      background: #fff; border: none;
      border-radius: 100px;
      color: #040406; font-weight: 800;
      font-size: 0.95rem; font-family: inherit;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }
    .submit-btn:hover::before { left: 100%; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .submit-btn:active { transform: scale(0.97); }
    body.white-theme .submit-btn { background: #0a0a12; color: #fff; }

    /* Info section */
    .info-section {
      margin-top: 28px; padding-top: 24px;
      border-top: 1px solid var(--glass-border);
    }
    .info-text {
      text-align: center; color: var(--text-s);
      font-size: 0.8rem; line-height: 1.6; margin-bottom: 16px;
    }

    .account-info {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 18px;
      display: none;
    }
    .account-info.show { display: block; }
    .account-label {
      font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-s); margin-bottom: 8px;
    }
    .saved-email {
      color: hsl(var(--accent-hue),80%,70%);
      font-weight: 700; font-size: 0.9rem;
      margin-bottom: 14px; word-break: break-all;
    }
    .clear-btn {
      width: 100%; padding: 11px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 100px;
      color: #ef4444; font-weight: 700;
      font-size: 0.8rem; cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.2s;
    }
    .clear-btn:hover { background: rgba(239,68,68,0.18); }
    .clear-btn:active { transform: scale(0.97); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }
    .modal-overlay.active { display: flex; }

    .modal-content {
      background: #0d0d14;
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 32px; max-width: 380px; width: 100%;
      transform: scale(0.92); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.active .modal-content { transform: scale(1); opacity: 1; }
    body.white-theme .modal-content { background: #f8f8fc; }

    .modal-icon {
      width: 58px; height: 58px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: hsla(var(--accent-hue),80%,50%,0.15);
      border: 1px solid hsla(var(--accent-hue),80%,60%,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-icon svg { width: 28px; height: 28px; stroke: hsl(var(--accent-hue),80%,70%); stroke-width: 2; }
    .modal-title {
      font-size: 1.2rem; font-weight: 800; text-align: center;
      margin-bottom: 10px; color: var(--text-p);
    }
    .modal-message {
      color: var(--text-s); line-height: 1.6;
      margin-bottom: 24px; text-align: center; font-size: 0.85rem;
    }
    .modal-email { color: hsl(var(--accent-hue),80%,70%); font-weight: 700; word-break: break-all; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1; padding: 14px; border: none;
      border-radius: 100px; font-weight: 700;
      font-size: 0.875rem; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .modal-btn:active { transform: scale(0.97); }
    .modal-btn-primary {
      background: #fff; color: #040406;
    }
    body.white-theme .modal-btn-primary { background: #0a0a12; color: #fff; }
    .modal-btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text-p);
      border: 1px solid var(--glass-border);
    }
    body.white-theme .modal-btn-secondary { background: rgba(0,0,0,0.06); }

    @media (max-width: 400px) {
      .login-card { padding: 24px 20px; }
      .modal-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="liquid-bg">
    <div class="blob" id="blob1" style="top:-10%;left:-10%;background:hsla(240,80%,50%,0.3);"></div>
    <div class="blob" id="blob2" style="bottom:-10%;right:-10%;background:hsla(280,80%,50%,0.3);"></div>
  </div>

  <div class="login-container">
    <div class="login-wrapper">

      <div class="brand">
        <div class="brand-logo-icon">
          <i class="fa-solid fa-bolt-lightning"></i>
        </div>
        <div class="brand-name">AADAconnect</div>
        <div class="brand-sub">Smart Home Control</div>
      </div>

      <div class="login-card">
        <form id="loginForm" onsubmit="handleLogin(event)">

          <div class="form-group">
            <label class="field-label" for="email">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="email" class="no-right-icon" placeholder="your@email.com" required>
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div class="error" id="emailError">Please enter a valid email address</div>
          </div>

          <div class="form-group">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" class="has-toggle" placeholder="Enter your password" required>
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <svg class="password-toggle" id="togglePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </div>
            <div class="error" id="passwordError">Please enter a password</div>
          </div>

          <div class="error" id="loginError"></div>

          <button type="submit" class="submit-btn">Continue</button>
        </form>

        <div class="info-section">
          <p class="info-text">First time? We'll create an account for you automatically</p>
          <div class="account-info" id="accountInfo">
            <div class="account-label">Currently saved account</div>
            <div class="saved-email" id="savedEmail"></div>
            <button class="clear-btn" onclick="clearAccount()">Clear Saved Account</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Switch Account Modal -->
  <div class="modal-overlay" id="switchModal">
    <div class="modal-content">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <polyline points="17 11 19 13 23 9"/>
        </svg>
      </div>
      <h2 class="modal-title">Switch Account?</h2>
      <p class="modal-message">
        An account (<span class="modal-email" id="existingEmail"></span>) is already saved.
        Do you want to switch to the new account?
      </p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" onclick="cancelSwitch()">Cancel</button>
        <button class="modal-btn modal-btn-primary" onclick="confirmSwitch()">Switch</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script>
    let pendingAccount = null;

    // Apply theme from dashboard
    function initTheme() {
      const isWhite = localStorage.getItem('whiteTheme') === 'true';
      if (isWhite) document.body.classList.add('white-theme');
      // Apply saved blob preset
      const preset = localStorage.getItem('bgPreset') || 'dynamic';
      const presets = {
        ocean:  { h1:200, h2:160 }, sunset: { h1:15, h2:320 },
        forest: { h1:130, h2:170 }, aurora: { h1:270, h2:180 }
      };
      if (preset === 'custom') {
        const c1 = localStorage.getItem('customBlob1') || '#5533ff';
        const c2 = localStorage.getItem('customBlob2') || '#8833ff';
        document.getElementById('blob1').style.background = hexToBlob(c1);
        document.getElementById('blob2').style.background = hexToBlob(c2);
      } else if (presets[preset]) {
        const p = presets[preset];
        document.documentElement.style.setProperty('--accent-hue', p.h1);
        document.getElementById('blob1').style.background = `hsla(${p.h1},80%,50%,0.3)`;
        document.getElementById('blob2').style.background = `hsla(${p.h2},80%,50%,0.3)`;
      } else {
        // dynamic — time-based
        const h = new Date().getHours();
        const h1 = h>=5&&h<11?40 : h>=11&&h<17?200 : h>=17&&h<21?280 : 240;
        const h2 = h>=5&&h<11?15 : h>=11&&h<17?160 : h>=17&&h<21?320 : 260;
        document.documentElement.style.setProperty('--accent-hue', h1);
        document.getElementById('blob1').style.background = `hsla(${h1},80%,50%,0.3)`;
        document.getElementById('blob2').style.background = `hsla(${h2},80%,50%,0.3)`;
      }
    }

    function hexToBlob(hex) {
      const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b); let h=0, s=0, l=(max+min)/2;
      if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}
      return `hsla(${Math.round(h*360)},${Math.round(s*100)}%,50%,0.3)`;
    }

    // Password toggle
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.innerHTML = type === 'text'
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    function hashValue(value) {
      return CryptoJS.SHA256(value).toString(CryptoJS.enc.Hex);
    }

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const loginError = document.getElementById('loginError');
      emailError.classList.remove('show');
      passwordError.classList.remove('show');
      loginError.classList.remove('show');
      if (!email || !password) {
        if (!email) emailError.classList.add('show');
        if (!password) passwordError.classList.add('show');
        return;
      }
      const hashedEmail = hashValue(email);
      const hashedPassword = hashValue(password);
      const accountKey = hashedEmail + '|' + hashedPassword;
      const existingAccount = localStorage.getItem('aada_account');
      const existingEmail = localStorage.getItem('aada_email');
      if (!existingAccount) {
        saveAccount(email, password, hashedEmail, hashedPassword);
        loginUser(email, password, hashedEmail, hashedPassword);
        alert('Account created successfully!');
        window.location.href = 'dashboard.html';
      } else if (existingAccount === accountKey) {
        loginUser(email, password, hashedEmail, hashedPassword);
        window.location.href = 'dashboard.html';
      } else {
        pendingAccount = { email, password, hashedEmail, hashedPassword };
        document.getElementById('existingEmail').textContent = existingEmail;
        document.getElementById('switchModal').classList.add('active');
      }
    }

    function saveAccount(email, password, hashedEmail, hashedPassword) {
      const accountKey = hashedEmail + '|' + hashedPassword;
      localStorage.setItem('aada_account', accountKey);
      localStorage.setItem('aada_email', email);
      localStorage.setItem('aada_password', password);
      localStorage.setItem('aada_hashed_email', hashedEmail);
      localStorage.setItem('aada_hashed_password', hashedPassword);
    }

    function loginUser(email, password, hashedEmail, hashedPassword) {
      sessionStorage.setItem('current_user', JSON.stringify({ email, password, hashed_email: hashedEmail, hashed_password: hashedPassword }));
    }

    function clearAllAccountData() {
      ['aada_account','aada_email','aada_password','aada_hashed_email','aada_hashed_password'].forEach(k => localStorage.removeItem(k));
      sessionStorage.clear();
    }

    function confirmSwitch() {
      if (!pendingAccount) return;
      clearAllAccountData();
      saveAccount(pendingAccount.email, pendingAccount.password, pendingAccount.hashedEmail, pendingAccount.hashedPassword);
      loginUser(pendingAccount.email, pendingAccount.password, pendingAccount.hashedEmail, pendingAccount.hashedPassword);
      document.getElementById('switchModal').classList.remove('active');
      pendingAccount = null;
      alert('Account switched successfully!');
      window.location.href = 'dashboard.html';
    }

    function cancelSwitch() {
      document.getElementById('switchModal').classList.remove('active');
      pendingAccount = null;
      const loginError = document.getElementById('loginError');
      loginError.textContent = 'Please use the saved account or clear it to create a new one';
      loginError.classList.add('show');
    }

    function clearAccount() {
      const savedEmail = localStorage.getItem('aada_email');
      if (!savedEmail) { alert('No account saved to clear'); return; }
      if (confirm(`Are you sure you want to clear the saved account (${savedEmail})? This will log you out.`)) {
        clearAllAccountData(); location.reload();
      }
    }

    function showAccountInfo() {
      const savedEmail = localStorage.getItem('aada_email');
      if (savedEmail) {
        document.getElementById('savedEmail').textContent = savedEmail;
        document.getElementById('accountInfo').classList.add('show');
      }
    }

    window.onload = function() {
      initTheme();
      const currentUser = sessionStorage.getItem('current_user');
      if (currentUser) { window.location.href = 'dashboard.html'; return; }
      const remembered = localStorage.getItem('remembered_user');
      if (remembered && localStorage.getItem('rememberMe') === 'true') {
        try { sessionStorage.setItem('current_user', remembered); window.location.href = 'dashboard.html'; return; } catch(e) {}
      }
      showAccountInfo();
    };
  </script>
</body>
</html>
